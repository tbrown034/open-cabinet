# TEST ONLY — runs every 2 minutes to verify the pipeline works.
# DELETE THIS FILE after testing is confirmed working.
# It will burn API credits if left running!

name: Test Pipeline (delete after testing)

on:
  schedule:
    - cron: "*/2 * * * *" # Every 2 minutes
  workflow_dispatch:

jobs:
  test-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pipeline (dry run only — no API cost)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          echo "=== Test Pipeline Run ==="
          echo "Time: $(date)"
          echo "Checking OGE API (dry run)..."
          timeout 120 pnpm run pipeline -- --dry-run 2>&1 | head -50 || echo "Pipeline timed out (expected for full OGE scan)"
          echo ""
          echo "=== Validation ==="
          pnpm run validate 2>&1 | tail -15
          echo ""
          echo "=== Test Complete ==="
