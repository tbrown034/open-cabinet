<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Ultra-simple filing cabinet at 16px -->
  <!-- Top section (closed drawer) -->
  <rect x="2" y="1" width="12" height="6" rx="0.5" fill="#292524" />
  <rect x="6.5" y="3.5" width="3" height="1" rx="0.5" fill="#a8a29e"/>
  <!-- Bottom section (open drawer, slightly wider) -->
  <rect x="1" y="8" width="14" height="6" rx="0.5" fill="#57534e"/>
  <rect x="6.5" y="10.5" width="3" height="1" rx="0.5" fill="#d6d3d1"/>
</svg>
