<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#1c1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Simplified filing cabinet for favicon -->
  <rect x="6" y="4" width="20" height="26" rx="1" />
  <!-- Top section -->
  <line x1="6" y1="11" x2="26" y2="11" />
  <line x1="14" y1="7.5" x2="18" y2="7.5" />
  <!-- Open drawer -->
  <rect x="4" y="12" width="24" height="7" rx="0.5" />
  <line x1="14" y1="15.5" x2="18" y2="15.5" />
  <!-- Bottom section -->
  <line x1="6" y1="20" x2="26" y2="20" />
  <line x1="14" y1="24" x2="18" y2="24" />
</svg>
