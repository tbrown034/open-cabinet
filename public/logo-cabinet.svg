<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1c1917" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Filing cabinet body -->
  <rect x="12" y="8" width="40" height="52" rx="1.5" />

  <!-- Top drawer (closed) -->
  <line x1="12" y1="22" x2="52" y2="22" />
  <!-- Top drawer handle -->
  <line x1="28" y1="15" x2="36" y2="15" />

  <!-- Middle drawer (OPEN - pulled out) -->
  <rect x="8" y="24" width="48" height="14" rx="1" />
  <!-- Middle drawer handle -->
  <line x1="28" y1="31" x2="36" y2="31" />
  <!-- Papers peeking out of open drawer -->
  <line x1="16" y1="27" x2="16" y2="24" stroke-width="1.5" />
  <line x1="20" y1="26" x2="20" y2="24" stroke-width="1.5" />
  <line x1="24" y1="27.5" x2="24" y2="24" stroke-width="1.5" />

  <!-- Bottom drawer (closed) -->
  <line x1="12" y1="40" x2="52" y2="40" />
  <!-- Bottom drawer handle -->
  <line x1="28" y1="47" x2="36" y2="47" />

  <!-- Divider line in bottom section -->
  <line x1="12" y1="54" x2="52" y2="54" />
</svg>
